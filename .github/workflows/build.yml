name: Build on PR

on:
  pull_request:
    branches:
      - master
      - main

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/primepay?sslmode=disable
  NEXTAUTH_SECRET: ci-build-secret
  NEXTAUTH_URL: http://localhost:3000
  JWT_SECRET: ci-build-secret
  GOOGLE_CLIENT_ID: ci-google-client-id
  GOOGLE_CLIENT_SECRET: ci-google-client-secret

jobs:
  build:
    name: Build the project
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: primepay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: packages/db
        run: npx prisma generate

      - name: Run database migrations
        working-directory: packages/db
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: packages/db
        run: npx prisma db seed

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Build
        run: npm run build
